#Common Properties for Spring Project
server.port=8084
spring.application.name=catalog-service

#exposing actuators
management.endpoints.web.exposure.include=*
management.endpoints.enabled-by-default=true

#Registering with Eureka Server
eureka.instance.preferIpAddress = true
eureka.client.registerWithEureka = true
eureka.client.fetchRegistry = true
eureka.client.serviceUrl.defaultZone = http://localhost:8761/eureka/



#Database Config
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/product-catalog-db?createDatabaseIfNotExist=true&useSSL=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL57Dialect
spring.jpa.show-sql=false

#cloud config
spring.config.import=optional:configserver:http://localhost:8071/

#Spring Sleuth Properties
spring.zipkin.enabled=false
spring.sleuth.sampler.probability=1.0
spring.zipkin.baseUrl=http://localhost:9411/

spring.boot.admin.client.url=http://localhost:9000
spring.boot.admin.client.username=${SPRING_BOOT_ADMIN_CLIENT_USERNAME:client}
spring.boot.admin.client.password=${SPRING_BOOT_ADMIN_CLIENT_PASSWORD:client}
management.endpoint.health.show-details=always

#Redis Cache
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000


spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

#OpenSearch
spring.elasticsearch.rest.uris=http://${OPENSEARCH_HOST:localhost}:9200
