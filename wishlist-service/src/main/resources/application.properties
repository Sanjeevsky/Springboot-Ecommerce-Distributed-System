server.port=8091
spring.application.name=wishlist-service
spring.profiles.active=dev
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/wishlist-db?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
management.endpoints.web.exposure.include=*
eureka.instance.preferIpAddress=true
eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
spring.config.import=optional:configserver:http://localhost:8071/
spring.zipkin.baseUrl=http://localhost:9411/
spring.zipkin.enabled=false
spring.sleuth.sampler.probability=1.0
management.endpoint.health.show-details=always
spring.boot.admin.client.url=http://localhost:9000
spring.boot.admin.client.username=${SPRING_BOOT_ADMIN_CLIENT_USERNAME:client}
spring.boot.admin.client.password=${SPRING_BOOT_ADMIN_CLIENT_PASSWORD:client}

clients.cart.url=

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
