management.endpoints.web.exposure.include=*
management.endpoints.enabled-by-default=true
spring.profiles.active=dev

spring.config.import=optional:configserver:http://localhost:8071

spring.sleuth.sampler.probability=1.0
spring.zipkin.baseUrl=http://localhost:9411/
spring.zipkin.enabled=false

feign.circuitbreaker.enabled=true
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=15000
resilience4j.timelimiter.configs.default.timeoutDuration=15s
resilience4j.timelimiter.configs.default.cancelRunningFuture=false

resilience4j.circuitbreaker.instances.shopping-cart-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.shopping-cart-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.shopping-cart-service.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.payment-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.payment-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.payment-service.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.coupon-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.coupon-service.failureRateThreshold=60
resilience4j.circuitbreaker.instances.coupon-service.waitDurationInOpenState=5s

spring.boot.admin.client.url=http://localhost:9000
spring.boot.admin.client.username=client
spring.boot.admin.client.password=${SPRING_BOOT_ADMIN_CLIENT_PASSWORD:client}
management.endpoint.health.show-details=always

# Feign client URLs (overridden in docker via env vars)
clients.cart.url=
clients.customer.url=
clients.payment.url=
clients.coupon.url=
clients.inventory.url=

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
