#Common Properties for Spring Project
server.port=8082
spring.application.name=customer-service

#Database Config
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/customer-service-db?createDatabaseIfNotExist=true&useSSL=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL57Dialect
spring.jpa.show-sql=false

#exposing actuators
management.endpoints.web.exposure.include=*
management.endpoints.enabled-by-default=true

#Registering with Eureka Server
eureka.instance.preferIpAddress = true
eureka.client.registerWithEureka = true
eureka.client.fetchRegistry = true
eureka.client.serviceUrl.defaultZone = http://localhost:8761/eureka/

#cloud config
spring.config.import=optional:configserver:http://localhost:8071

#Spring Sleuth Properties
spring.zipkin.enabled=false
spring.sleuth.sampler.percentage=1
spring.zipkin.baseUrl=http://localhost:9411/

spring.boot.admin.client.url=http://localhost:9000
spring.boot.admin.client.username=client
spring.boot.admin.client.password=${SPRING_BOOT_ADMIN_CLIENT_PASSWORD:client}
management.endpoint.health.show-details=always

feign.circuitbreaker.enabled=true

#Kafka Producer
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

#Kafka Consumer
spring.kafka.consumer.group-id=customer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
