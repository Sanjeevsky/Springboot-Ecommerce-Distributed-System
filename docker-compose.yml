  kafka-connect:
    image: debezium/connect:2.4
    restart: unless-stopped
    ports:
      - "8093:8083"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium-connect-configs
      OFFSET_STORAGE_TOPIC: debezium-connect-offsets
      STATUS_STORAGE_TOPIC: debezium-connect-statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  connector-init:
    image: curlimages/curl:8.4.0
    depends_on:
      kafka-connect:
        condition: service_healthy
    restart: "no"
    environment:
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        curl -sf http://kafka-connect:8083/connectors/catalog-mysql-connector > /dev/null 2>&1 && echo "Connector already registered" || curl -sf -X POST http://kafka-connect:8083/connectors -H "Content-Type: application/json" -d "{\"name\":\"catalog-mysql-connector\",\"config\":{\"connector.class\":\"io.debezium.connector.mysql.MySqlConnector\",\"database.hostname\":\"mysql\",\"database.port\":\"3306\",\"database.user\":\"root\",\"database.password\":\"$$MYSQL_PASSWORD\",\"database.server.id\":\"184054\",\"topic.prefix\":\"catalog\",\"database.include.list\":\"product-catalog-db\",\"table.include.list\":\"product-catalog-db.product\",\"schema.history.internal.kafka.bootstrap.servers\":\"kafka:29092\",\"schema.history.internal.kafka.topic\":\"schema-changes.catalog\",\"include.schema.changes\":\"false\",\"snapshot.mode\":\"schema_only\",\"key.converter\":\"org.apache.kafka.connect.json.JsonConverter\",\"value.converter\":\"org.apache.kafka.connect.json.JsonConverter\",\"key.converter.schemas.enabled\":\"false\",\"value.converter.schemas.enabled\":\"false\"}}"
    networks:
      - ecommerce-network

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      # 4173 (vite preview convention) — 5173 stays free for `npm run dev`
      - "4173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      # 127.0.0.1, not localhost: nginx listens IPv4-only, busybox wget prefers ::1
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
  redis-data:
  grafana-data:
  opensearch-data:
  minio-data:

networks:
  ecommerce-network:
    driver: bridge
