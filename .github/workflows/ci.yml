name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Postman collections
        run: node scripts/validate-postman.js

      - name: Validate service configuration
        run: node scripts/validate-service-config.js

      - name: Validate generated architecture
        run: python3 generate-arch.py --check

      - name: Validate shell scripts
        run: bash -n scripts/verify-local.sh scripts/build-docker-jars.sh e2e-smoke-test.sh

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Validate platform tools Compose profile
        run: docker compose --profile platform-tools config --quiet

  java-tests:
    name: Java tests - ${{ matrix.module }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - api-gateway
          - auth-server
          - catalog-service
          - cloud-config
          - coupon-service
          - customer-service
          - inventory-service
          - notification-service
          - order-service
          - payment-service
          - review-service
          - service-discovery
          - shopping-cart-service
          - spring-server
          - wishlist-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install shared platform commons
        run: mvn -B -f platform-commons/pom.xml clean install -DskipTests

      - name: Run module tests
        env:
          MODULE: ${{ matrix.module }}
        run: |
          mvn -B -f "$MODULE/pom.xml" clean test \
            -DfailIfNoTests=false \
            -Dspring.config.name=application-test \
            -Dspring.cloud.config.enabled=false \
            -Dspring.cloud.config.import-check.enabled=false \
            "-Dspring.config.import=" \
            "-Dtest=!*ApplicationTests"
