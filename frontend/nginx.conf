server {
    listen 80;
    listen [::]:80;

    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve the gateway via Docker's embedded DNS (127.0.0.11) on each
    # request. Using a variable in proxy_pass forces runtime resolution, so a
    # recreated api-gateway container (new IP) does not leave nginx serving a
    # stale upstream — the cause of 502s after `docker compose up` redeploys.
    location ~ ^/api/(.*)$ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gateway api-gateway;
        proxy_pass http://$gateway:8081/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
